<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #FAF8F5; }
      .text-fill { fill: #1a1a2e; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a2e; }
      .text-fill { fill: #FAF8F5; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- Italian flag ring -->
  <path d="M 90 10 A 80 80 0 0 0 90 170" stroke="#008C45" stroke-width="6" fill="none"/>
  <path d="M 90 170 A 80 80 0 0 0 90 10" stroke="#CD212A" stroke-width="6" fill="none"/>
  <!-- Shopping bag -->
  <g transform="translate(55, 30)">
    <path d="M 25 20 Q 25 6 35 6 Q 45 6 45 20" stroke="#D4A854" stroke-width="4" fill="none" stroke-linecap="round"/>
    <rect x="8" y="20" width="22" height="40" rx="3" fill="#008C45"/>
    <rect x="30" y="20" width="12" height="40" fill="#FFFFFF" stroke="#E8E4DE" stroke-width="0.5"/>
    <rect x="42" y="20" width="22" height="40" rx="3" fill="#CD212A"/>
  </g>
  <!-- Letter B -->
  <text x="90" y="145" font-family="Georgia, serif" font-size="36" font-weight="bold" class="text-fill" text-anchor="middle">B</text>
</svg>
